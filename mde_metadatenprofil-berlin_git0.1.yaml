- section: "Einordnung"
  fields:
    - id: 5
      key: "isoMetadata.metadataProfile"
      label: "Metadaten-Typ"
      multiplicity: "1..1"
      field_type: "Formularfeld"
      type: "Auswahlliste"
      role: "DHS / Redakteur"
      iso_export: "-"
      other_channels: ""
      description: |
        Auswahl der entsprechenden INSPIRE Relevanz. Entsprechend werden abhängige Metadatenfelder angezeigt oder nicht. Ebenso werden bei der ISO-Erzeugung entsprechende Templates und Erzegungsregeln angewandt.
        Beim ändern des INSPIRE-Typs zu ISO sollen die zusätzlichen Felder dennoch gespeichert bleiben, sie tauchen im Formular aber nicht mehr auf und werden bei der ISO-Erzeugung nicht berücksichtigt.
      codelists_defaults: |
        Codeliste:
        - ISO
        - INSPIRE identifiziert
        - INSPIRE harmonisiert
      buttons:
        help: true
        copy: true
        adopt: false
        template: true
        delete: false
    - id: 7
      key: "isoMetadata.inspireTheme"
      label: "INSPIRE Annex Thema"
      multiplicity: "K..1"
      field_type: "Formularfeld"
      type: "Auswahlliste"
      role: "DHS / Redakteur"
      iso_export: "ISO 53"
      other_channels: "Geoserver"
      description: |
        Konditionales Feld: Es wird nur angezeigt, wenn Metadatentyp "INSPIRE-harmonisiert" oder "INSPIRE-identifiziert" ausgewählt wurde.
        Mehrfachauswahl möglich, wenn Typ = INSPIRE identifiziert. Wenn Typ = INSPIRE harmonisiert, dann kann nur ein Thema ausgewählt werden. 
        Das Feld bedingt automatische Vorbelegungen bzw. INSPIRE spezifische Auswahllisten in weiteren Formularfeldern und bei der ISO-Erzeugung.
      codelists_defaults: "https://inspire.ec.europa.eu/theme/theme.de.xml"
      buttons:
        help: true
        copy: true
        adopt: false
        template: true
        delete: false
    - id: 70
      key: "isoMetadata.inspireFormatName"
      label: "Schema-Name des INSPIRE Themas"
      multiplicity: "K..1"
      field_type: "Formularfeld"
      type: "Auswahlliste"
      role: "Redakteur"
      iso_export: "ISO 270 / (ISO 285)"
      other_channels: ""
      description: |
        Konditionales Feld, wird nur angezeigt, wenn Metadatentyp "INSPIRE-harmonisiert" ausgewählt wurde.
        Auswahl der aus dem Annex-Thema zugehörigen Schemata.
      codelists_defaults: |
        https://inspire.ec.europa.eu/applicationschema/applicationschema.de.xml
      buttons:
        help: true
        copy: true
        adopt: false
        template: true
        delete: false
    - id: 38
      key: "isoMetadata.inspireAnnexVersion"
      label: "Schema-Version des INSPIRE Themas"
      multiplicity: "K..1"
      field_type: "Formularfeld"
      type: "Freitextfeld"
      role: "Redakteur"
      iso_export: "ISO 270 / (ISO 286)"
      other_channels: ""
      description: |
        Konditionales Feld, wird nur angezeigt, wenn Metadatentyp "INSPIRE-harmonisiert" ausgewählt wurde.
        Eintragen der INSPIRE-Annex-Schema Version in ein Freitextfeld. Alle anderen Metadaten-Typen bekommen an dieser Stelle eine automatische Vorbelegung.
      codelists_defaults: |
        https://inspire.ec.europa.eu/applicationschema/applicationschema.de.xml
      buttons:
        help: true
        copy: true
        adopt: false
        template: true
        delete: false
    - id: 37
      key: "isoMetadata.valid"
      label: "Überprüfung des Qualitätsberichts"
      multiplicity: "K..1"
      field_type: "Formularfeld"
      type: "Entscheidung J/N"
      role: "Redakteur"
      iso_export: "ISO 107 / (ISO 128-132)"
      other_channels: ""
      description: |
        Konditionales Feld, wird nur angezeigt, wenn Metadatentyp "INSPIRE-harmonisiert" ausgewählt wurde.
      codelists_defaults: ""
      buttons:
        help: true
        copy: true
        adopt: false
        template: true
        delete: false
    - id: 4
      key: "isoMetadata.privacy"
      label: "Datenschutz-Einstellungen"
      multiplicity: "1..1"
      field_type: "Formularfeld"
      type: "Auswahlliste"
      role: "DHS / Redakteur"
      iso_export: "-"
      other_channels: "Gateway"
      description: |
        Die Auswahl aus der Liste bedingt die Vorbelegung der Nutzungsbestimmungen:
        Wird "Nicht Datenschut relevant" ausgewählt, so wird bei den NB die codeliste "terms_of_use.yaml" angezeigt.
        Wird ein anderer Datenschutz ausgewählt, wird bei den NB die codeliste "terms_of_use_on_privacy.yaml" angezeigt.
      codelists_defaults: |
        https://github.com/gdi-be/mde-deployment/blob/main/codelists/privacy.yaml
      buttons:
        help: true
        copy: true
        adopt: false
        template: true
        delete: false
    - id: 25
      key: "isoMetadata.termsOfUseId"
      label: "Nutzungsbestimmungen"
      multiplicity: "1..1"
      field_type: "Formularfeld"
      type: "Auswahlliste"
      role: "DHS / Redakteur"
      iso_export: "ISO 20 / (ISO 67-72)"
      other_channels: ""
      description: |
        Auswahlliste ist abhängig vom ausgewählten Datenschutz:
        Wird "Nicht Datenschut relevant" ausgewählt, so wird bei den NB die codeliste "terms_of_use.yaml" angezeigt. Vorbelegung mit "Datenlizenz Deutschland Zero 2.0".
        Wird ein anderer Datenschutz ausgewählt, wird bei den NB die codeliste "terms_of_use_on_privacy.yaml" angezeigt. Vorbelegung mit "Dienstgebrauch".
      codelists_defaults: |
        https://github.com/gdi-be/mde-deployment/blob/main/codelists/terms_of_use.yaml
        
        https://github.com/gdi-be/mde-deployment/blob/main/codelists/terms_of_use_on_privacy.yaml
      buttons:
        help: true
        copy: true
        adopt: false
        template: true
        delete: false
    - id: 26
      key: "isoMetadata.termsOfUseSource"
      label: "Quellenangabe"
      multiplicity: "k..1"
      field_type: "Formularfeld"
      type: "Freitextfeld"
      role: "DHS / Redakteur"
      iso_export: "ISO 20 / (ISO 67-72)"
      other_channels: ""
      description: |
        Konditionales Feld. Es erscheint nur, wenn die NB 2, 3 oder 4 der  "terms_of_use.yaml" ausgewählt wurde. Die NB 1 brauch keine Quellenangabe. Erfassen der anzugebenden Quelle. Diese wird bei der ISO-Erzeugung als Variable in die JSON-Notation und in den Text der Nutzungsbestimmungen übernommen.
      codelists_defaults: ""
      buttons:
        help: true
        copy: true
        adopt: false
        template: true
        delete: false
    - id: 6
      key: "isoMetadata.highValueDataset"
      label: "High Value Datensatz"
      multiplicity: "1..1"
      field_type: "Bereich"
      type: "Entscheidung J/N"
      role: "DHS / Redakteur"
      iso_export: "-"
      other_channels: ""
      description: |
        Ein "ja" bedingt das Eintragen der HVD-Kategorie in die ISO-Metadaten. Ebenso muss bei "ja" das Feld HVD-Kategorie ausgefüllt werden.
      codelists_defaults: ""
      buttons:
        help: true
        copy: true
        adopt: false
        template: true
        delete: false
    - id: 8
      key: "isoMetadata.highValueDataCategory"
      label: "HVD Kategorien"
      multiplicity: "K..1"
      field_type: "Formularfeld"
      type: "Auswahlliste"
      role: "DHS / Redakteur"
      iso_export: "ISO 53"
      other_channels: ""
      description: |
        Auswahlliste von HVD-Kategorien, wenn HVD-Betroffenheit vorliegt. Mehrfachauswahl möglich. Keine Automatische Vorbelegung.
      codelists_defaults: "http://data.europa.eu/bna/asd487ae75"
      buttons:
        help: false
        copy: false
        adopt: false
        template: false
        delete: false
    - id: 13
      key: "isoMetadata.topicCategory"
      label: "Themenkategorie"
      multiplicity: "1..1"
      field_type: "Formularfeld"
      type: "Auswahlliste"
      role: "Redakteur"
      iso_export: "ISO 41"
      other_channels: "Geoportal"
      description: |
        Wenn oben ein INSPIRE Thema ausgewählt wurde, wird die Auswahlliste entsprechend der Zuordnungstabelle der GDI-DE vorausgefüllt. Wenn nicht, kann aus der Auswahlliste ein Eintrag frei ausgewählt werden.
      codelists_defaults: |
        ISO-Codelist: https://standards.iso.org/iso/19139/resources/gmxCodelists.xml#MD_KeywordTypeCode
        
        Zuordnungstabelle zu INSPIRE-Thema: https://www.gdi-de.org/download/AK_Metadaten_Konventionen_zu_Metadaten.pdf#page=85
      buttons:
        help: true
        copy: true
        adopt: false
        template: true
        delete: false
