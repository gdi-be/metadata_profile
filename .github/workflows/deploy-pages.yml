name: Generate HTML Table and Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Passe das an, falls dein Hauptbranch 'master' heißt
  workflow_dispatch:

# Erlaubt der Action, die GitHub Pages Site zu steuern
permissions:
  contents: read
  pages: write
  id-token: write

# Verhindert, dass mehrere Deployments gleichzeitig laufen und sich blockieren
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 1. Job: HTML generieren
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Stabil und zukunftssicher

      - name: Install Dependencies
        run: |
          pip install pyyaml

      - name: Run HTML Generator Script
        run: |
          python scripts/generate_table.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # Wir laden gezielt NUR die index.html hoch, 
          # damit keine temporären Skripte auf Pages landen
          path: '.' 

  # 2. Job: Das erzeugte Artefakt auf Pages ausrollen
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
