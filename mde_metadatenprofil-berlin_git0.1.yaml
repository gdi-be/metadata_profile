- section: "Basisangaben"
  fields:
    - id: 1
      key: "isoMetadata.title"
      label: "Titel des Datenbestandes"
      multiplicity: "1..1"
      field_type: "Formularfeld"
      type: "Freitextfeld (maximal 250 Zeichen)"
      role: "DHS / Redakteur"
      iso_export: "ISO 24 / (360 - title)"
      other_channels: ""
      description: |
        Der Titel des Datenbestandes muss im internen Metadatenkatalog eineindeutig sein. Das Formular verhindert durch Überprüfung eine Fehleingabe.
        Ab 100 Zeichen wird die Zeichenanzeige rot eingefärbt.
      codelists_defaults: ""
      buttons:
        help: true
        copy: true
        adopt: false
        template: true
        delete: false
    - id: 2
      key: "isoMetadata.description"
      label: "Kurzbeschreibung des Datenbestandes"
      multiplicity: "1..1"
      field_type: "Formularfeld"
      type: "Freitextfeld (maximal 1250 Zeichen)"
      role: "DHS / Redakteur"
      iso_export: "ISO 25 (abstract)"
      other_channels: ""
      description: |
        Erfassen eines unformatierten Textes als Kurzbschreibung. Zeilenumbrüche sind zulässig.
      codelists_defaults: ""
      buttons:
        help: true
        copy: true
        adopt: false
        template: true
        delete: false
    - id: 15
      key: "isoMetadata.keywords"
      label: "Schlagwörter"
      multiplicity: "1..*"
      field_type: "Formularfeld"
      type: "Vorbelegungen / Thesaurus / Freitextfeld"
      role: "DHS / Redakteur"
      iso_export: "ISO 53"
      other_channels: "Geoserver"
      description: |
        Erfassen von thematischen Schlagwörtern über:
        Thesaurus Umthes, Einzeleingabe, kommaseparierte Eingabe.
        Übernahme in Datenbestands- und alle Dienst-Metadaten.
        Alle bedingten Schlagwörter werden bei der ISO-Erzeugung automatisch gesetzt und werden in der Schlagwortliste ausgegraut angezeigt.
      codelists_defaults: |
        Umthes Thesaurus: https://sns.uba.de
        
        Vorbelegungen für GDI-BE: Karten, Geodaten, Berlin
        Zusätzlich für Darstellungsdienste: Karten
        Zusätzlich für Downloaddienste: Sachdaten
        
        Vorbelegungen für GDI-DE:
        Für offene NB: opendata, open data
        Für INSPIRE Daten: inspireidentifiziert
      buttons:
        help: true
        copy: true
        adopt: false
        template: true
        delete: false
    - id: 29
      key: "isoMetadata.preview"
      label: "Vorschaubild"
      multiplicity: "1..1"
      field_type: "Formularfeld"
      type: "URL"
      role: "DHS / Redakteur"
      iso_export: "ISO 31 / (ISO 48-51)"
      other_channels: ""
      description: |
        Erfassen einer URL auf eine im Internet aufrufbare Vorschaugrafik.
      codelists_defaults: ""
      buttons:
        help: true
        copy: true
        adopt: false
        template: true
        delete: false
    - id: 19
      key: "isoMetadata.pointsOfContact"
      label: "Kontaktangaben"
      multiplicity: "1..*"
      field_type: "Bereich"
      type: "Inkrement"
      role: "DHS / Redakteur"
      iso_export: "ISO 29 / ISO 379 - role"
      other_channels: ""
      description: |
        Ein Kontakt ist mindestens auszufüllen. Die Anzahl kann über den Plus-Button erhöht werden.
        Beim Erzeugen von ISO-MD wird die Art des Kontaktes automatisiert auf "pointOfContact" in ISO-Feld 379 gesetzt.
        Kontaktangaben des angemeldeten Nutzenden können per Übernahme-Button aus dem angebundenen AD-Userverzeichnis in eine neue Kontaktangabe übernommen werden und angepasst werden.
      codelists_defaults: |
        Vorbelegung für Metadatenkontaktangabe aller Metadaten:
        https://github.com/gdi-be/mde-deployment/blob/main/codelists/contact.yaml
        
        Vorbelegung ISO 379: pointOfContact
      buttons:
        help: true
        copy: false
        adopt: true
        template: true
        delete: true
